name: Deploy

on:
  push:
    branches:
      - main

# Never cancel a running deployment
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Quality check
        run: pnpm quality

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OIDC authentication — requires AWS IAM setup:
      # 1. Create an OIDC identity provider in IAM for token.actions.githubusercontent.com
      #    - Provider URL: https://token.actions.githubusercontent.com
      #    - Audience: sts.amazonaws.com
      # 2. Create/update the IAM role trust policy to allow this repo:
      #    {
      #      "Version": "2012-10-17",
      #      "Statement": [{
      #        "Effect": "Allow",
      #        "Principal": {
      #          "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com"
      #        },
      #        "Action": "sts:AssumeRoleWithWebIdentity",
      #        "Condition": {
      #          "StringEquals": {
      #            "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
      #          },
      #          "StringLike": {
      #            "token.actions.githubusercontent.com:sub": "repo:gong8/knownissue:environment:production"
      #          }
      #        }
      #      }]
      #    }
      # 3. Set AWS_ROLE_ARN in GitHub repo secrets (Settings > Secrets > Actions)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Restore sst.config.ts
        env:
          SST_CONFIG_B64: ${{ secrets.SST_CONFIG }}
        run: echo "$SST_CONFIG_B64" | base64 -d > sst.config.ts

      - name: Restore Dockerfile
        env:
          DOCKERFILE_B64: ${{ secrets.DOCKERFILE }}
        run: echo "$DOCKERFILE_B64" | base64 -d > Dockerfile

      - name: Deploy with SST
        run: npx sst deploy --stage production

      - name: Verify ECS deployment health
        env:
          ECS_CLUSTER: knownissue-production-ClusterCluster-xtadnfcs
          ECS_SERVICE: Api
        run: |
          MAX_WAIT=300
          INTERVAL=15
          elapsed=0

          echo "Waiting for ECS deployment to stabilize..."

          while [ $elapsed -lt $MAX_WAIT ]; do
            STATUS=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState | [0]' --output text)

            echo "  rolloutState: $STATUS (${elapsed}s)"

            if [ "$STATUS" = "COMPLETED" ]; then
              echo "Deployment healthy — new containers running."
              exit 0
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "::error::ECS deployment failed — circuit breaker rolled back to old containers."
              REASON=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
                --query 'services[0].deployments[?status==`PRIMARY`].rolloutStateReason | [0]' --output text)
              echo "Reason: $REASON"
              STOPPED=$(aws ecs list-tasks --cluster "$ECS_CLUSTER" --service-name "$ECS_SERVICE" --desired-status STOPPED --query 'taskArns[0:2]' --output text)
              if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
                echo "Recent stopped tasks:"
                aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks $STOPPED \
                  --query 'tasks[*].{reason:stoppedReason}' --output table
              fi
              exit 1
            fi

            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

          echo "::error::Deployment did not stabilize within ${MAX_WAIT}s"
          exit 1
