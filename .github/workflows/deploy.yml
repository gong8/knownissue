name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: Target stage
        required: true
        type: choice
        options:
          - staging
          - production

# Never cancel a running deployment
concurrency:
  group: deploy-${{ github.event.inputs.stage || 'production' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # -------------------------------------------------------------------
  # 1. CI gate - lint and build must pass before deploying
  # -------------------------------------------------------------------
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # -------------------------------------------------------------------
  # 2. Deploy via SST
  # -------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci]
    environment: ${{ github.event.inputs.stage || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy with SST
        env:
          SST_STAGE: ${{ github.event.inputs.stage || 'production' }}
        run: npx sst deploy --stage "$SST_STAGE"
