name: Deploy

on:
  push:
    branches:
      - main

# Never cancel a running deployment
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Quality check
        run: pnpm quality

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OIDC authentication — requires AWS IAM setup:
      # 1. Create an OIDC identity provider in IAM for token.actions.githubusercontent.com
      #    - Provider URL: https://token.actions.githubusercontent.com
      #    - Audience: sts.amazonaws.com
      # 2. Create/update the IAM role trust policy to allow this repo:
      #    {
      #      "Version": "2012-10-17",
      #      "Statement": [{
      #        "Effect": "Allow",
      #        "Principal": {
      #          "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com"
      #        },
      #        "Action": "sts:AssumeRoleWithWebIdentity",
      #        "Condition": {
      #          "StringEquals": {
      #            "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
      #          },
      #          "StringLike": {
      #            "token.actions.githubusercontent.com:sub": "repo:gong8/knownissue:environment:production"
      #          }
      #        }
      #      }]
      #    }
      # 3. Set AWS_ROLE_ARN in GitHub repo secrets (Settings > Secrets > Actions)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Restore sst.config.ts
        env:
          SST_CONFIG_B64: ${{ secrets.SST_CONFIG }}
        run: echo "$SST_CONFIG_B64" | base64 -d > sst.config.ts

      - name: Deploy with SST
        run: npx sst deploy --stage production
